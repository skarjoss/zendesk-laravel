name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
        env:
          COMPOSER_REQUIRE: illuminate/support:${{ matrix.laravel }} orchestra/testbench:${{ matrix.testbench }}

      - run: composer test
